<html>
    <head>
        <style>

/* items associated with protagonists */


/* gallery styling */
	
.gallery *,
.gallery *::after,
.gallery *::before {
  margin: 0;
  padding: 0;
}
	
.gallery {
  display: grid;
  grid-template-columns: repeat(8, 1fr);
  grid-template-rows: repeat(8, 3em);
  grid-gap: 0.75em; 
}
		
.gallery-img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block; 
}

.gallery-item-1 {
  grid-column-start: 1;
  grid-column-end: 3;
  grid-row-start: 1;
  grid-row-end: 3;

  /** Alternative Syntax **/
  /* grid-column: 1 / span 2;  */
  /* grid-row: 1 / span 2; */
}

.gallery-item-2 {
  grid-column-start: 3;
  grid-column-end: 5;
  grid-row-start: 1;
  grid-row-end: 3;
	

  /** Alternative Syntax **/
  /* grid-column: 3 / span 2;  */
  /* grid-row: 1 / span 2; */
}
		
.gallery-item-3 {
  grid-column-start: 5;
  grid-column-end: 9;
  grid-row-start: 1;
  grid-row-end: 6;

  /** Alternative Syntax **/
  /* grid-column: 5 / span 4;
  grid-row: 1 / span 5; */
}
		
.gallery-item-4 {
  grid-column-start: 1;
  grid-column-end: 5;
  grid-row-start: 3;
  grid-row-end: 6;
/* or for short [rs/cs/re/ce]: grid-area: 3 / 1 / 6 / 5; */
	

  /** Alternative Syntax **/
  /* grid-column: 1 / span 4;  */
  /* grid-row: 3 / span 3; */
}

.gallery-item-5 {
  grid-column-start: 1;
  grid-column-end: 5;
  grid-row-start: 6;
  grid-row-end: 9;

  /** Alternative Syntax **/
  /* grid-column: 1 / span 4; */
  /* grid-row: 6 / span 3; */
}

.gallery-item-6 {
  grid-column-start: 5;
  grid-column-end: 9;
  grid-row-start: 6;
  grid-row-end: 9;

  /** Alternative Syntax **/
  /* grid-column: 5 / span 4; */
  /* grid-row: 6 / span 3; */
}		

/* Other Page Styling */	
	
	
body {
  margin: 0;
  padding: 0;
  font-size: 20px; 
}

body {
  font-family: "Nunito", sans-serif;
  color: #333;
  font-weight: 300;
  line-height: 1.5em; 
   background: #999;
}

.wrapper {
  width: 960px;
  margin: 0 auto;
  padding: .5em 0 0;
  background: #fff;
}
	
main {
	padding: 0 2em;
	}
		
footer.site-footer {
	background: #4488aa;
	color: #fff;
	margin-top: 3em;
	padding: 1em 2em;
	}	
		
footer.site-footer a {	
	color: #fff;
	}
		
footer.site-footer a:hover {	
	color: #aaa;
	text-decoration: none;
	}	
		


        </style>
    </head>

    <body>

        <img src = "img/img_head.png">

        <div class=”gallery”>

        <figure class="gallery-item gallery-item-1">
            <img src="img/a_court_of_thorns_and_roses.png" class="gallery-img" alt="Image 1">
        </figure>

        <figure class="gallery-item gallery-item-2">
            <img src="img/a_winters_promise.png" class="gallery-img" alt="Image 2">
        </figure>

        <figure class="gallery-item gallery-item-3">
            <img src="img/fourth_wing.png" class="gallery-img" alt="Image 3">
        </figure>

        <figure class="gallery-item gallery-item-4">
            <img src="img/gideon_the_ninth.png" class="gallery-img" alt="Image 4">
        </figure>

        <figure class="gallery-item gallery-item-5">
            <img src="img/harrow_the_ninth.png" class="gallery-img" alt="Image 5">
        </figure>

        <figure class="gallery-item gallery-item-6">
            <img src="img/silver_elite.png" class="gallery-img" alt="Image 6">
        </figure>

        <figure class="gallery-item gallery-item-7">
            <img src="img/the_cruel_prince.png" class="gallery-img" alt="Image 7">
        </figure>

        <figure class="gallery-item gallery-item-8">
            <img src="img/the_priory_of_the_orange_tree.png" class="gallery-img" alt="Image 8">
        </figure>

        </div>


    </body>
</html>
